<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <title>ユーザー登録</title>
        <link rel="stylesheet" href="styles/auth.css" />
        <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    </head>
    <body>
        <div class="container">
            <form id="register-form">
                <div id="info-section">
                    <label for="email">メールアドレス</label>
                    <input type="email" id="email" required />

                    <label for="username">ユーザー名</label>
                    <input type="text" id="username" required />

                    <label for="password">パスワード</label>
                    <input type="password" id="password" placeholder="******" required />

                    <label for="confirm-password">パスワードの再入力</label>
                    <input type="password" id="confirm-password" placeholder="******" required />

                    <label for="phone">電話番号</label>
                    <input type="tel" id="phone" placeholder="08012345678" required />

                    <div id="recaptcha-container"></div>

                    <button type="submit" id="register-btn" disabled>登録</button>
                </div>

                <div id="code-section" style="display: none">
                    <label for="code">認証コード</label>
                    <input type="text" id="code" />
                    <button type="button" id="verify-code">認証</button>
                </div>
            </form>
            <div id="message"></div>
        </div>
        <script type="module" src="scripts/auth.js"></script>
    </body>
</html>
